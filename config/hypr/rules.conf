# ┌──────────────────────────────┐
# │       Window Rules           │
# └──────────────────────────────┘

# Empêcher le maximize sauvage
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Apps flottantes
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
    size = 800 500
    center = true
}

windowrule {
    name = float-blueman
    match:class = ^(.blueman-manager-wrapped|blueman-manager)$
    float = true
    size = 700 450
    center = true
}

windowrule {
    name = float-nwg-look
    match:class = ^(nwg-look)$
    float = true
    size = 800 600
    center = true
}

windowrule {
    name = float-imv
    match:class = ^(imv)$
    float = true
    center = true
}

# Opacity pour certaines apps
windowrule {
    name = opacity-ghostty
    match:class = ^(com.mitchellh.ghostty)$
    opacity = 0.92 0.88
}

windowrule {
    name = opacity-nemo
    match:class = ^(nemo)$
    opacity = 0.95 0.90
}
