# │       Look & Feel 💜         │
# └──────────────────────────────┘

# ── Palette Colony ──
# Centraliser les couleurs ici pour changer de thème facilement
$accentColor = rgba(9b59b6ee)
$accentColorAlt = rgba(8e44adee)
$inactiveColor = rgba(2c2c2caa)
$shadowColor = rgba(1a1a2eee)
$bgColor = rgba(0d0d14ff)

general {
    gaps_in = 3
    gaps_out = 4
    border_size = 2

    col.active_border = $accentColor $accentColorAlt 45deg
    col.inactive_border = $inactiveColor

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = $shadowColor
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.3
        popups = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vfr = true
}

render {
    new_render_scheduling = true
}
