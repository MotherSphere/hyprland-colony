# ┌──────────────────────────────┐
# │        Animations ⚡         │
# └──────────────────────────────┘

animations {
    enabled = true

    # Courbes inspirées Material/Caelestia
    # Les fenêtres arrivent doucement, partent vite → feeling "physique"
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standard, 0.2, 0, 0, 1
    bezier = snappy, 0.15, 1, 0.3, 1
    bezier = liner, 1, 1, 1, 1

    # Fenêtres — décel à l'arrivée, accel au départ
    animation = windowsIn, 1, 2, snappy, popin 90%
    animation = windowsOut, 1, 3, emphasizedAccel, popin 80%
    animation = windowsMove, 1, 4, standard

    # Workspaces
    animation = workspaces, 1, 4, standard
    animation = specialWorkspace, 1, 3, snappy, slidefadevert -15%

    # Fade
    animation = fade, 1, 4, standard
    animation = fadeDim, 1, 4, standard

    # Bordures — rotation continue pour l'effet gradient animé
    animation = border, 1, 4, standard
    animation = borderangle, 1, 50, liner, loop

    # Layers (menus, popups) — descendent du haut
    animation = layersIn, 1, 3, emphasizedDecel, slide top
    animation = layersOut, 1, 2, emphasizedAccel, slide top
    animation = fadeLayers, 1, 3, standard
}
